plugins {
    id 'java-library'
    id 'maven-publish'
}

base.archivesName = project.name.toLowerCase()

java.toolchain.languageVersion.set(JavaLanguageVersion.of(25))

repositories {
    mavenCentral()
}

dependencies {
    api 'org.apache.logging.log4j:log4j-core:2.26.0'
    annotationProcessor 'org.apache.logging.log4j:log4j-core:2.26.0'

    api 'org.jline:jline-reader:3.20.0'

    compileOnly 'org.checkerframework:checker-qual:3.17.0'
}

java {
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.warnings = false
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId project.group
            artifactId project.name.toLowerCase()
            version project.version
            from components.java
        }
    }

    repositories {
        mavenLocal()

        maven {
            url = layout.buildDirectory.dir('repo')
        }
    }
}